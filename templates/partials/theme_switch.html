<div class="theme-switch" role="group" aria-label="Тема оформления">
  <button type="button" class="theme-switch__btn" data-theme-set="light" title="Светлая"><i class="fa-regular fa-sun" aria-hidden="true"></i></button>
  <button type="button" class="theme-switch__btn" data-theme-set="dark" title="Тёмная"><i class="fa-regular fa-moon" aria-hidden="true"></i></button>
  <button type="button" class="theme-switch__btn" data-theme-set="system" title="Как в системе"><i class="fa-solid fa-circle-half-stroke" aria-hidden="true"></i></button>
</div>
