{% extends "base.html" %}
{% block title %}Восстановление{% endblock %}
{% block auth_content %}
<section class="card card--center auth-card">
  <h1 class="h1 h1--auth">Восстановление пароля</h1>
  <p class="muted auth-subtitle">Укажите email — пришлём код. На следующей странице введите код и новый пароль.</p>
  <form method="post" action="/forgot-password" class="form-grid auth-form">
    <label class="field">
      <span class="field__label"><i class="fa-regular fa-envelope" aria-hidden="true"></i> Email</span>
      <input type="email" name="email" required class="input">
    </label>
    <button type="submit" class="btn btn--primary auth-main-btn"><i class="fa-solid fa-paper-plane" aria-hidden="true"></i><span>Получить код</span></button>
  </form>
  <p class="auth-links"><a href="/login"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Назад ко входу</a></p>
</section>
{% endblock %}
