{% extends "base.html" %}
{% block title %}Новый пароль{% endblock %}
{% block auth_content %}
<section class="card card--center auth-card">
  <h1 class="h1 h1--auth">Сброс пароля</h1>
  <p class="muted auth-subtitle">Тот же email, код из письма и новый пароль.</p>

  <form method="post" action="/reset-password" class="form-grid auth-form">
    <label class="field">
      <span class="field__label">Email</span>
      <input type="email" name="email" required class="input" autocomplete="username"
             value="{{ dev_reset_email }}">
    </label>
    <label class="field">
      <span class="field__label">Код из письма</span>
      <input type="text" name="code" required maxlength="6" pattern="[0-9]{6}" inputmode="numeric" autocomplete="one-time-code"
             class="input" placeholder="000000">
    </label>
    <label class="field">
      <span class="field__label">Новый пароль</span>
      <input type="password" name="password" required minlength="8" autocomplete="new-password" class="input">
    </label>
    <button type="submit" class="btn btn--primary auth-main-btn"><i class="fa-solid fa-check" aria-hidden="true"></i><span>Сохранить пароль</span></button>
  </form>

  {% if dev_reset_code %}
  <p class="muted small" style="margin-top:1rem;">Отладка: код <strong>{{ dev_reset_code }}</strong></p>
  {% endif %}

  <p class="muted small" style="margin-top:1rem;"><a href="/login">← Вход</a></p>
</section>
{% endblock %}
