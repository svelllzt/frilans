{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block auth_content %}
<section class="card card--center auth-card">
  <p class="auth-brand"><i class="fa-solid fa-layer-group" aria-hidden="true"></i> Frilans</p>
  <h1 class="h1 h1--auth">Создать аккаунт</h1>
  <p class="muted auth-subtitle">После регистрации введите код из письма — без этого вход будет закрыт.</p>
  <form method="post" action="/register" class="form-grid auth-form">
    <label class="field">
      <span class="field__label"><i class="fa-regular fa-envelope" aria-hidden="true"></i> Email</span>
      <input type="email" name="email" required autocomplete="email" class="input">
    </label>
    <label class="field">
      <span class="field__label"><i class="fa-solid fa-key" aria-hidden="true"></i> Пароль</span>
      <input type="password" name="password" required minlength="8" autocomplete="new-password" class="input">
    </label>
    <button type="submit" class="btn btn--primary auth-main-btn"><i class="fa-solid fa-user-plus" aria-hidden="true"></i><span>Зарегистрироваться</span></button>
  </form>
  <p class="auth-links"><a href="/login"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Уже есть аккаунт</a></p>
</section>
{% endblock %}
